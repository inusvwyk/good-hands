  <!-- Phone + URL -->
  <text x="80" y="566" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#4ade80">069 874 0252</text>
  <text x="1120" y="566" font-family="Arial, sans-serif" font-size="22" fill="#334155" text-anchor="end">goodhands.co.za</text>
